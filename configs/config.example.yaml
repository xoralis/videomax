# videoMax 配置文件模板
# 复制此文件为 config.yaml 并填入实际值

server:
  port: 8080

mysql:
  dsn: "root:password@tcp(127.0.0.1:3306)/videomax?charset=utf8mb4&parseTime=True&loc=Local"

kafka:
  brokers:
    - "localhost:9092"
  topic: "video-tasks"
  group_id: "videomax-workers"

llm:
  provider: "doubao"                        # "openai" 或 "doubao"（留空默认 openai）
  api_key: "your-ark-api-key"               # 火山引擎 ARK 平台 API Key
  model: "ep-xxxx-your-endpoint-id"         # 推理接入点 ID（doubao）或模型名（openai: gpt-4o）
  base_url: ""                              # 留空使用对应供应商的默认地址

video:
  providers:
    - name: "doubao-seedance-1-0-pro-250528"  # 前端选择时的模型标识，同时作为 API 传入的 model ID
      provider: "bytedance"                   # 对应的服务商类型
      api_key: "your-ark-api-key-here"        # 火山引擎 ARK API Key
      base_url: ""                            # 留空使用默认: https://ark.cn-beijing.volces.com/api/v3
    - name: "kling-v1-6"
      provider: "kling"
      api_key: "your-access-key:your-secret-key"  # AK:SK 用冒号拼接
      base_url: ""
    - name: "hunyuan-video"                           # 混元视频生成（图生视频）
      provider: "hunyuan"
      api_key: "your-secret-id:your-secret-key"       # 腾讯云 SecretId:SecretKey，用冒号拼接
      base_url: ""                                     # 固定使用 vclm.tencentcloudapi.com，此字段忽略

storage:
  upload_dir: "./uploads"

oss:
  enabled: false
  endpoint: "oss-cn-hangzhou.aliyuncs.com"
  access_key_id: ""
  access_key_secret: ""
  bucket: ""
  base_url: ""  # 可选：自定义 CDN 域名，如 https://cdn.example.com，留空则使用 OSS 默认地址

log:
  level: "info"
  mode: "console"        # console / file / both
  file_path: "./logs/app.log"
  format: "console"      # console / json
  max_size_mb: 100
  max_backups: 10
  max_age_days: 7
  compress: true

langsmith:
  enabled: false
  api_key: "your-langsmith-api-key"
  project_name: "videomax"

jwt:
  secret: "change-this-to-a-strong-random-secret-in-production"
  expire_days: 7

rag:
  enabled: true
  milvus_addr: "localhost:19530"   # docker-compose 内部访问改为 "milvus-standalone:19530"
  collection: "videomax_knowledge"
  embed_api_key: ""                # 留空则复用 llm.api_key
  embed_base_url: ""               # 留空则复用 llm.base_url
  embed_model: "text-embedding-3-small"  # 支持: text-embedding-3-large / bge-m3 / doubao-embedding
  embed_dim: 0                     # 0 = 从 KnownModelDimensions 自动推断，手动覆盖可填具体数值
  top_k: 3

# videoMax 配置文件模板
# 复制此文件为 config.yaml 并填入实际值

server:
  port: 8080

mysql:
  dsn: "root:password@tcp(127.0.0.1:3306)/videomax?charset=utf8mb4&parseTime=True&loc=Local"

kafka:
  brokers:
    - "localhost:9092"
  topic: "video-tasks"
  group_id: "videomax-workers"

llm:
  provider: "doubao"                        # "openai" 或 "doubao"（留空默认 openai）
  api_key: "your-ark-api-key"               # 火山引擎 ARK 平台 API Key
  model: "ep-xxxx-your-endpoint-id"         # 推理接入点 ID（doubao）或模型名（openai: gpt-4o）
  base_url: ""                              # 留空使用对应供应商的默认地址

video:
  provider: "bytedance"                   # "bytedance"（字节 Seedance）或 "kling"（可灵）
  api_key: "your-ark-api-key-here"        # bytedance: ARK API Key；kling: "access_key:secret_key" 格式
  base_url: ""                            # 留空使用默认地址
  model: "doubao-seedance-2-0-260128"     # bytedance: Seedance 模型 ID；kling: "kling-v1" / "kling-v2-6" / "kling-v3"
  # --- 可灵配置示例 ---
  # provider: "kling"
  # api_key: "your-access-key:your-secret-key"  # AK:SK 用冒号拼接
  # model: "kling-v1"

storage:
  upload_dir: "./uploads"

log:
  level: "info"
  mode: "console"        # console / file / both
  file_path: "./logs/app.log"
  format: "console"      # console / json
  max_size_mb: 100
  max_backups: 10
  max_age_days: 7
  compress: true

langsmith:
  enabled: false
  api_key: "your-langsmith-api-key"
  project_name: "videomax"

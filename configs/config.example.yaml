# videoMax 配置文件模板
# 复制此文件为 config.yaml 并填入实际值

server:
  port: 8080

mysql:
  dsn: "root:password@tcp(127.0.0.1:3306)/videomax?charset=utf8mb4&parseTime=True&loc=Local"

kafka:
  brokers:
    - "localhost:9092"
  topic: "video-tasks"
  group_id: "videomax-workers"

llm:
  provider: "doubao"                        # "openai" 或 "doubao"（留空默认 openai）
  api_key: "your-ark-api-key"               # 火山引擎 ARK 平台 API Key
  model: "ep-xxxx-your-endpoint-id"         # 推理接入点 ID（doubao）或模型名（openai: gpt-4o）
  base_url: ""                              # 留空使用对应供应商的默认地址

video:
  provider: "bytedance"
  api_key: "your-ark-api-key-here"        # 火山引擎 ARK API Key
  base_url: ""                            # 留空则使用默认: https://ark.cn-beijing.volces.com/api/v3
  model: "doubao-seedance-2-0-260128"     # Seedance 模型 ID，可按需切换

storage:
  upload_dir: "./uploads"
